<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - KGL</title>
  <style>
    :root {
      --bg: #0b1221;
      --panel: #0f172a;
      --accent: #10b981;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: rgba(255,255,255,0.06);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #38bdf8);
      color: #0b1221;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .table-container {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: auto;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: rgba(255,255,255,0.02); font-weight: 600; }
    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(56,189,248,0.18);
      color: #38bdf8;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-size: 1rem;
    }
    .alert {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
    }
    .alert.success { background: rgba(16,185,129,0.16); color: var(--accent); border: 1px solid var(--accent); }
    .alert.error { background: rgba(244,63,94,0.18); color: #f87171; border: 1px solid #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 style="margin:0 0 4px 0">User Management</h1>
        <p style="margin:0;color:var(--muted)">Add and manage system users</p>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn" id="addUserBtn">+ Add User</button>
        <a href="/dashboard" class="btn btn-secondary">← Dashboard</a>
      </div>
    </div>

    <div class="alert" id="alert"></div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Branch</th>
            <th>Contact</th>
          </tr>
        </thead>
        <tbody id="userList"></tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Add New User</h2>
      <form id="userForm">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="name" required>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input type="password" id="password" required minlength="6">
        </div>
        <div class="form-group">
          <label>Role *</label>
          <select id="role" required>
            <option value="">Select role</option>
            <option value="agent">Sales Agent</option>
            <option value="manager">Manager</option>
            <option value="procurement">Procurement Officer</option>
          </select>
        </div>
        <div class="form-group">
          <label>Branch *</label>
          <select id="branch" required>
            <option value="">Select branch</option>
            <option value="branch1">Matugga</option>
            <option value="branch2">Maganjo</option>
          </select>
        </div>
        <div class="form-group">
          <label>Contact *</label>
          <input type="tel" id="contact" pattern="[0-9]{10,15}" required>
        </div>
        <div style="display:flex;gap:10px">
          <button type="submit" class="btn" style="flex:1">Add User</button>
          <button type="button" class="btn btn-secondary" id="cancelBtn" style="flex:1">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    async function loadUsers() {
      try {
        const res = await fetch(`${API_BASE}/api/admin/users`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        const users = data.users || [];
        renderUsers(users);
      } catch (err) {
        showAlert('Failed to load users', 'error');
      }
    }

    function renderUsers(users) {
      const tbody = document.getElementById('userList');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted)">No users found</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(user => `
        <tr>
          <td>${user.name}</td>
          <td>${user.email}</td>
          <td><span class="badge">${user.role}</span></td>
          <td>${user.branch}</td>
          <td>${user.contact}</td>
        </tr>
      `).join('');
    }

    document.getElementById('addUserBtn').addEventListener('click', () => {
      document.getElementById('modal').classList.add('active');
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      document.getElementById('modal').classList.remove('active');
    });

    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value,
        branch: document.getElementById('branch').value,
        contact: document.getElementById('contact').value
      };

      try {
        const res = await fetch(`${API_BASE}/api/auth/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          showAlert('User added successfully', 'success');
          document.getElementById('modal').classList.remove('active');
          document.getElementById('userForm').reset();
          loadUsers();
        } else {
          const result = await res.json();
          showAlert(result.error || 'Failed to add user', 'error');
        }
      } catch (err) {
        showAlert('Network error', 'error');
      }
    });

    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert ${type}`;
      alert.style.display = 'block';
      setTimeout(() => alert.style.display = 'none', 5000);
    }

    loadUsers();
  </script>
</body>
</html>
